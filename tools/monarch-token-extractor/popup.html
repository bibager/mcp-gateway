<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      width: 420px;
      padding: 14px;
      margin: 0;
      color: #1a1a1a;
    }
    h2 { font-size: 14px; margin: 0 0 8px; }
    .sub { font-size: 11px; color: #666; margin-bottom: 12px; }
    .row { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
    button {
      padding: 7px 12px;
      cursor: pointer;
      border-radius: 5px;
      border: 1px solid #c8c8c8;
      background: #fff;
      font-size: 12px;
      font-weight: 500;
    }
    button:hover:not(:disabled) { background: #f5f5f5; }
    button:disabled { cursor: not-allowed; opacity: 0.5; }
    button.primary { background: #4a8eff; color: #fff; border-color: #4a8eff; }
    button.primary:hover:not(:disabled) { background: #357ae8; }
    .result-box {
      background: #f9f9f9;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #eee;
      margin-top: 8px;
    }
    .label { font-size: 11px; color: #888; margin-bottom: 4px; }
    .token-value {
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
      word-break: break-all;
      background: #fff;
      padding: 6px;
      border-radius: 3px;
      border: 1px solid #e3e3e3;
      max-height: 140px;
      overflow: auto;
    }
    .ok { color: #1a7a1a; }
    .err { color: #b41818; }
    .status { font-size: 11px; margin-top: 8px; }
    .footer { font-size: 10px; color: #999; margin-top: 12px; padding-top: 8px; border-top: 1px solid #eee; }
  </style>
</head>
<body>
  <h2>Monarch Token Extractor</h2>
  <div class="sub">Captures your active Monarch session token from this tab.</div>

  <div id="result">Scanning active tab…</div>

  <div class="row">
    <button id="copy" class="primary" disabled>Copy token</button>
    <button id="refresh">Re-scan</button>
  </div>

  <div class="status" id="status"></div>

  <div class="footer">
    Token stays on your machine — only goes where you paste it.
  </div>

  <script src="popup.js"></script>
</body>
</html>
